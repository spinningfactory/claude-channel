[tasks.build]
description = "Build with all features"
run = "cargo build --release --all-features"

[tasks.up]
description = "Start test infrastructure (redis, postgres, localstack, nats)"
env = { AWS_ENDPOINT_URL = "http://localhost:4566", AWS_ACCESS_KEY_ID = "test", AWS_SECRET_ACCESS_KEY = "test", AWS_DEFAULT_REGION = "us-east-1" }
run = "bash scripts/mise/up.sh"

[tasks.down]
description = "Stop test infrastructure"
run = "docker compose -f .devcontainer/docker-compose.yml down"

[tasks.test]
description = "Quick test (webhook only, no containers)"
depends = ["build"]
run = "bash scripts/mise/test.sh"

[tasks.test-all]
description = "Full integration test (all 5 sources)"
depends = ["build", "up"]
env = { AWS_ENDPOINT_URL = "http://localhost:4566", AWS_ACCESS_KEY_ID = "test", AWS_SECRET_ACCESS_KEY = "test", AWS_DEFAULT_REGION = "us-east-1" }
run = "bash scripts/mise/test-all.sh"

[tasks.session]
description = "Launch a Claude Code session with multi-session coordination"
depends = ["build", "up"]
usage = "session <name> <goal> [project-dir]"
run = "bash scripts/mise/session.sh"

[tasks.sessions]
description = "List active Claude Code sessions"
run = "./scripts/session-list.sh"

[tasks.test-multi]
description = "Launch 3 coordinated Claude sessions in tmux"
depends = ["build", "up"]
run = "bash scripts/mise/test-multi.sh"

[tasks.server]
description = "Start the channel server (TCP + dashboard)"
depends = ["build"]
env = { REDIS_URL = "redis://127.0.0.1:16379", TCP_PORT = "9000", DASHBOARD_PORT = "8900" }
run = "./target/release/claude-channel-server"

[tasks.dashboard]
description = "Launch the web dashboard (legacy standalone mode)"
depends = ["up"]
run = "./target/release/claude-channel-dashboard"

[tasks.generate-test-data]
description = "Generate multi-day multi-room test data (7 rooms, 173 events, 3 days)"
depends = ["up"]
run = "./scripts/generate-test-data.sh"

[tasks.audit]
description = "Audit test data in Redis for ordering and consistency issues"
run = "python3 ./scripts/audit-test-data.py"

[tasks.docker-build]
description = "Build the Docker image"
run = "docker compose build"

[tasks.docker-up]
description = "Start production services with docker compose"
run = "docker compose up -d"

[tasks.docker-down]
description = "Stop production services"
run = "docker compose down"

[tasks.docker-logs]
description = "Show docker compose logs"
run = "docker compose logs -f"

[tasks.deploy]
description = "Build and start production services"
depends = ["docker-build"]
run = "docker compose up -d"

[tasks.clean]
description = "Stop infrastructure and clean build artifacts"
run = "docker compose -f .devcontainer/docker-compose.yml down 2>/dev/null || true && cargo clean && rm -rf /tmp/claude-sessions"
