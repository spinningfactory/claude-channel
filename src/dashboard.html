<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Claude Channel Dashboard</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0d1117; color: #c9d1d9; }

  .container { display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: auto 1fr; height: 100vh; gap: 1px; background: #21262d; }
  .header { grid-column: 1 / -1; padding: 12px 20px; background: #161b22; border-bottom: 1px solid #30363d; display: flex; align-items: center; gap: 16px; }
  .header h1 { font-size: 16px; font-weight: 600; color: #f0f6fc; }
  .header .status { font-size: 13px; color: #8b949e; }
  .header .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 4px; }
  .dot.connected { background: #3fb950; }
  .dot.disconnected { background: #f85149; }

  .panel { background: #0d1117; overflow: hidden; display: flex; flex-direction: column; }
  .panel-header { padding: 10px 16px; font-size: 13px; font-weight: 600; color: #8b949e; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid #21262d; background: #161b22; }

  /* Graph panel */
  #graph-panel svg { width: 100%; height: 100%; }
  .node circle { stroke: #30363d; stroke-width: 2; cursor: pointer; }
  .node text { fill: #c9d1d9; font-size: 11px; font-weight: 500; }
  .node .goal { fill: #8b949e; font-size: 10px; }
  .link { stroke: #30363d; stroke-width: 1.5; fill: none; }
  .link.active { stroke: #58a6ff; stroke-width: 2; }
  .message-particle { fill: #58a6ff; }

  /* Chat panel */
  #chat-panel { overflow: hidden; }
  #chat-messages { flex: 1; overflow-y: auto; padding: 8px; }
  .chat-msg { padding: 6px 12px; margin: 2px 0; border-radius: 6px; font-size: 13px; line-height: 1.4; }
  .chat-msg.message { background: #161b22; border-left: 3px solid #58a6ff; }
  .chat-msg.join { background: #0d2818; border-left: 3px solid #3fb950; color: #3fb950; font-size: 12px; }
  .chat-msg.leave { background: #2d1117; border-left: 3px solid #f85149; color: #f85149; font-size: 12px; }
  .chat-msg .meta { display: flex; gap: 8px; margin-bottom: 2px; }
  .chat-msg .from { font-weight: 600; color: #f0f6fc; }
  .chat-msg .channel { color: #8b949e; font-size: 11px; }
  .chat-msg .time { color: #484f58; font-size: 11px; margin-left: auto; }
  .chat-msg .body { color: #c9d1d9; }

  /* Sessions panel */
  #sessions-panel { }
  #sessions-list { flex: 1; overflow-y: auto; padding: 8px; }
  .session-card { padding: 10px 12px; margin: 4px 0; background: #161b22; border-radius: 6px; border: 1px solid #21262d; }
  .session-card .name { font-weight: 600; color: #58a6ff; font-size: 14px; }
  .session-card .goal { color: #8b949e; font-size: 12px; margin-top: 2px; }
  .session-card .started { color: #484f58; font-size: 11px; margin-top: 4px; }

  /* Git-graph sequence panel */
  #sequence-panel { }
  #sequence-wrap { flex: 1; overflow-y: auto; overflow-x: auto; }
  #sequence-svg { display: block; min-width: 100%; }
  .gg-line { fill: none; stroke-width: 2.5; stroke-linecap: round; }
  .gg-line-dead { stroke-dasharray: 4 3; opacity: 0.3; }
  .gg-node { stroke: #0d1117; stroke-width: 2; cursor: pointer; }
  .gg-connector { fill: none; stroke-width: 1.5; opacity: 0.55; }
  .gg-connector-bc { stroke-dasharray: 5 3; }
  .gg-col-label { font-size: 11px; font-weight: 600; fill: #c9d1d9; text-anchor: middle; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
  .gg-tooltip { pointer-events: none; }
  .gg-tooltip rect { fill: #1c2128; stroke: #30363d; rx: 4; }
  .gg-tooltip text { fill: #c9d1d9; font-size: 11px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
  .gg-time { font-size: 10px; fill: #484f58; text-anchor: end; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }

  @media (max-width: 900px) {
    .container { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>Claude Channel Dashboard</h1>
    <span class="status"><span class="dot" id="status-dot"></span><span id="status-text">Connecting...</span></span>
    <span class="status" id="session-count"></span>
  </div>

  <div class="panel" id="graph-panel">
    <div class="panel-header">Session Graph</div>
    <svg id="graph"></svg>
  </div>

  <div class="panel" id="chat-panel">
    <div class="panel-header">Message Feed</div>
    <div id="chat-messages"></div>
  </div>

  <div class="panel" id="sessions-panel">
    <div class="panel-header">Active Sessions</div>
    <div id="sessions-list"></div>
  </div>

  <div class="panel" id="sequence-panel">
    <div class="panel-header">Git Graph</div>
    <div id="sequence-wrap">
      <svg id="sequence-svg"></svg>
    </div>
  </div>
</div>

<script>
const sessions = new Map();
const messages = [];
const edges = new Map(); // "from->to" => count

// --- SSE Connection ---
let evtSource;
function connect() {
  evtSource = new EventSource('/events');
  evtSource.onopen = () => {
    document.getElementById('status-dot').className = 'dot connected';
    document.getElementById('status-text').textContent = 'Connected';
  };
  evtSource.onerror = () => {
    document.getElementById('status-dot').className = 'dot disconnected';
    document.getElementById('status-text').textContent = 'Reconnecting...';
  };
  evtSource.onmessage = (e) => {
    const event = JSON.parse(e.data);
    handleEvent(event);
  };
}

function handleEvent(event) {
  if (event.event_type === 'sessions') {
    // Full session list update
    const sessionData = JSON.parse(event.body);
    sessions.clear();
    sessionData.forEach(([name, data]) => {
      sessions.set(name, data);
    });
    renderSessions();
    updateGraph();
    return;
  }

  // Chat message
  messages.push(event);
  if (messages.length > 200) messages.shift();

  if (event.event_type === 'join') {
    sessions.set(event.from, { goal: event.body });
    renderSessions();
  } else if (event.event_type === 'leave') {
    sessions.delete(event.from);
    renderSessions();
  }

  // Track edges for graph
  if (event.from && event.from !== 'unknown' && event.from !== '_system') {
    let target = 'broadcast';
    if (event.channel.startsWith('claude:session:')) {
      target = event.channel.replace('claude:session:', '');
    }
    const key = `${event.from}->${target}`;
    edges.set(key, (edges.get(key) || 0) + 1);
  }

  renderChat();
  renderSequence();
  updateGraph();
}

// --- Sessions List ---
function renderSessions() {
  const el = document.getElementById('sessions-list');
  const count = document.getElementById('session-count');
  count.textContent = `${sessions.size} session${sessions.size !== 1 ? 's' : ''} online`;

  el.innerHTML = '';
  sessions.forEach((data, name) => {
    const card = document.createElement('div');
    card.className = 'session-card';
    const goal = typeof data === 'object' ? (data.goal || 'unknown') : data;
    const started = typeof data === 'object' && data.started
      ? new Date(data.started).toLocaleTimeString() : '';
    card.innerHTML = `
      <div class="name">${esc(name)}</div>
      <div class="goal">${esc(goal)}</div>
      ${started ? `<div class="started">since ${started}</div>` : ''}
    `;
    el.appendChild(card);
  });
}

// --- Chat Feed ---
function renderChat() {
  const el = document.getElementById('chat-messages');
  const last10 = messages.slice(-50);
  el.innerHTML = '';
  last10.forEach(msg => {
    const div = document.createElement('div');
    div.className = `chat-msg ${msg.event_type}`;
    const time = new Date(msg.timestamp).toLocaleTimeString();
    const ch = msg.channel.replace('claude:', '');

    if (msg.event_type === 'join') {
      div.innerHTML = `<span class="time">${time}</span> <b>${esc(msg.from)}</b> joined — ${esc(msg.body)}`;
    } else if (msg.event_type === 'leave') {
      div.innerHTML = `<span class="time">${time}</span> <b>${esc(msg.from)}</b> left`;
    } else {
      div.innerHTML = `
        <div class="meta">
          <span class="from">${esc(msg.from)}</span>
          <span class="channel">#${esc(ch)}</span>
          <span class="time">${time}</span>
        </div>
        <div class="body">${esc(msg.body)}</div>
      `;
    }
    el.appendChild(div);
  });
  el.scrollTop = el.scrollHeight;
}

// --- Git-Graph Sequence Visualization ---
const GG_COLORS = ['#58a6ff', '#f0883e', '#3fb950', '#bc8cff', '#f778ba', '#79c0ff', '#d2a8ff'];
const GG = {
  colW: 100,       // horizontal spacing between session columns
  rowH: 44,        // vertical spacing between event rows
  leftPad: 60,     // left margin for timestamps
  topPad: 36,      // top margin for column labels
  nodeR: 6,        // node circle radius
  joinR: 8,        // join/leave marker radius
};

// Track session column order persistently
const ggColumns = [];             // ordered list of session names
const ggDeadSessions = new Set(); // sessions that have left

function ggColIndex(name) {
  let idx = ggColumns.indexOf(name);
  if (idx === -1) {
    ggColumns.push(name);
    idx = ggColumns.length - 1;
  }
  return idx;
}

function ggX(name) {
  return GG.leftPad + ggColIndex(name) * GG.colW + GG.colW / 2;
}

function ggColor(name) {
  return GG_COLORS[ggColIndex(name) % GG_COLORS.length];
}

function renderSequence() {
  const wrap = document.getElementById('sequence-wrap');
  const svg = d3.select('#sequence-svg');
  svg.selectAll('*').remove();

  // Filter relevant messages
  const events = messages.filter(m =>
    m.event_type === 'message' || m.event_type === 'join' || m.event_type === 'leave'
  ).slice(-60);

  if (events.length === 0) return;

  // Ensure columns exist for all referenced sessions
  events.forEach(ev => {
    if (ev.from && ev.from !== 'unknown' && ev.from !== '_system') {
      ggColIndex(ev.from);
    }
  });

  const numCols = ggColumns.length;
  const numRows = events.length;
  const svgW = GG.leftPad + numCols * GG.colW + 40;
  const svgH = GG.topPad + numRows * GG.rowH + 40;

  svg.attr('width', svgW).attr('height', svgH);

  // Defs for arrowheads per color
  const defs = svg.append('defs');
  GG_COLORS.forEach((color, i) => {
    defs.append('marker')
      .attr('id', 'gg-arrow-' + i)
      .attr('viewBox', '0 0 10 10')
      .attr('refX', 10).attr('refY', 5)
      .attr('markerWidth', 5).attr('markerHeight', 5)
      .attr('orient', 'auto-start-reverse')
      .append('path')
      .attr('d', 'M 0 0 L 10 5 L 0 10 z')
      .attr('fill', color);
  });

  // Layers: lines behind, connectors, then nodes on top
  const lineLayer = svg.append('g');
  const connLayer = svg.append('g');
  const nodeLayer = svg.append('g');
  const labelLayer = svg.append('g');
  const tipLayer = svg.append('g');

  // Column header labels
  ggColumns.forEach((name, ci) => {
    const x = GG.leftPad + ci * GG.colW + GG.colW / 2;
    labelLayer.append('text')
      .attr('class', 'gg-col-label')
      .attr('x', x).attr('y', 16)
      .attr('fill', ggColor(name))
      .text(name);
    // Faint vertical guide
    lineLayer.append('line')
      .attr('x1', x).attr('x2', x)
      .attr('y1', GG.topPad - 8).attr('y2', svgH - 10)
      .attr('stroke', ggColor(name))
      .attr('stroke-width', 1)
      .attr('opacity', 0.08);
  });

  // Compute per-session first/last row and alive set at each row
  const sessionFirstRow = {};
  const sessionLastRow = {};
  const aliveAtRow = [];
  const alive = new Set();

  events.forEach((ev, ri) => {
    const name = ev.from;
    if (ev.event_type === 'join') alive.add(name);
    aliveAtRow.push(new Set(alive));
    if (name && name !== 'unknown' && name !== '_system') {
      if (!(name in sessionFirstRow)) sessionFirstRow[name] = ri;
      sessionLastRow[name] = ri;
    }
    if (ev.event_type === 'leave') alive.delete(name);
  });

  // Draw vertical branch lines per session (solid colored lines)
  ggColumns.forEach(name => {
    if (!(name in sessionFirstRow)) return;
    const x = ggX(name);
    const y1 = GG.topPad + sessionFirstRow[name] * GG.rowH;
    const y2 = GG.topPad + sessionLastRow[name] * GG.rowH;
    const isDead = ggDeadSessions.has(name);

    lineLayer.append('line')
      .attr('class', 'gg-line' + (isDead ? ' gg-line-dead' : ''))
      .attr('x1', x).attr('x2', x)
      .attr('y1', y1).attr('y2', y2)
      .attr('stroke', ggColor(name));
  });

  // Render each event as a row
  events.forEach((ev, ri) => {
    const y = GG.topPad + ri * GG.rowH;
    const name = ev.from;
    const x = (name && name !== 'unknown' && name !== '_system') ? ggX(name) : GG.leftPad + 20;
    const color = (name && name !== 'unknown' && name !== '_system') ? ggColor(name) : '#8b949e';

    // Timestamp on left
    const time = new Date(ev.timestamp).toLocaleTimeString();
    labelLayer.append('text')
      .attr('class', 'gg-time')
      .attr('x', GG.leftPad - 8).attr('y', y + 4)
      .text(time);

    if (ev.event_type === 'join') {
      // Diamond marker for branch creation
      nodeLayer.append('rect')
        .attr('x', x - 7).attr('y', y - 7)
        .attr('width', 14).attr('height', 14)
        .attr('rx', 2)
        .attr('transform', 'rotate(45, ' + x + ', ' + y + ')')
        .attr('fill', '#3fb950')
        .attr('class', 'gg-node')
        .attr('stroke', '#0d1117');

      nodeLayer.append('text')
        .attr('x', x).attr('y', y + 1)
        .attr('text-anchor', 'middle')
        .attr('dominant-baseline', 'central')
        .attr('fill', '#0d1117')
        .attr('font-size', '10px')
        .attr('font-weight', '700')
        .text('+');

      labelLayer.append('text')
        .attr('x', x + 16).attr('y', y + 4)
        .attr('fill', '#3fb950')
        .attr('font-size', '11px')
        .text('joined');

    } else if (ev.event_type === 'leave') {
      // Circle with X for branch termination
      nodeLayer.append('circle')
        .attr('cx', x).attr('cy', y).attr('r', GG.joinR)
        .attr('fill', '#f85149')
        .attr('class', 'gg-node');

      nodeLayer.append('text')
        .attr('x', x).attr('y', y + 1)
        .attr('text-anchor', 'middle')
        .attr('dominant-baseline', 'central')
        .attr('fill', '#0d1117')
        .attr('font-size', '10px')
        .attr('font-weight', '700')
        .text('\u00d7');

      labelLayer.append('text')
        .attr('x', x + 16).attr('y', y + 4)
        .attr('fill', '#f85149')
        .attr('font-size', '11px')
        .text('left');

    } else {
      // Message node: colored dot on sender column
      nodeLayer.append('circle')
        .attr('cx', x).attr('cy', y).attr('r', GG.nodeR)
        .attr('fill', color)
        .attr('class', 'gg-node');

      const ch = ev.channel.replace('claude:', '');
      const isBroadcast = ch === 'questions';
      const isDM = ch.startsWith('session:');
      const dmTarget = isDM ? ch.replace('session:', '') : null;

      if (isBroadcast) {
        // Horizontal dashed connectors to all other alive sessions
        const aliveHere = aliveAtRow[ri];
        aliveHere.forEach(other => {
          if (other === name) return;
          const ox = ggX(other);
          const x1 = Math.min(x, ox) + GG.nodeR + 2;
          const x2 = Math.max(x, ox) - GG.nodeR - 2;
          connLayer.append('line')
            .attr('class', 'gg-connector gg-connector-bc')
            .attr('x1', x1).attr('y1', y)
            .attr('x2', x2).attr('y2', y)
            .attr('stroke', color);
          // Small receiver dot
          connLayer.append('circle')
            .attr('cx', ox).attr('cy', y).attr('r', 3)
            .attr('fill', color).attr('opacity', 0.5);
        });
      } else if (isDM && dmTarget) {
        // Curved bezier connector (like git merge arc)
        const tx = ggX(dmTarget);
        const cp = Math.abs(tx - x) * 0.4;
        const dir = x < tx ? 1 : -1;
        const path = 'M ' + (x + dir * (GG.nodeR + 2)) + ' ' + y +
          ' C ' + (x + dir * cp) + ' ' + (y - 16) +
          ', ' + (tx - dir * cp) + ' ' + (y - 16) +
          ', ' + (tx - dir * (GG.nodeR + 2)) + ' ' + y;
        connLayer.append('path')
          .attr('class', 'gg-connector')
          .attr('d', path)
          .attr('stroke', color)
          .attr('marker-end', 'url(#gg-arrow-' + (ggColIndex(name) % GG_COLORS.length) + ')');
        // Receiver dot
        connLayer.append('circle')
          .attr('cx', tx).attr('cy', y).attr('r', 3)
          .attr('fill', ggColor(dmTarget)).attr('opacity', 0.6);
      }

      // Tooltip (hidden until hover)
      const bodyShort = (ev.body || '').length > 40 ? ev.body.slice(0, 40) + '...' : (ev.body || '');
      const tipW = Math.max(bodyShort.length * 6.5 + 16, 80);
      const tipX = x + 14;
      const tipY = y - 14;

      const tipG = tipLayer.append('g')
        .attr('class', 'gg-tooltip')
        .attr('opacity', 0);

      tipG.append('rect')
        .attr('x', tipX).attr('y', tipY - 10)
        .attr('width', tipW).attr('height', 20)
        .attr('rx', 4);

      tipG.append('text')
        .attr('x', tipX + 6).attr('y', tipY + 4)
        .text(bodyShort);

      // Invisible hover target
      nodeLayer.append('circle')
        .attr('cx', x).attr('cy', y).attr('r', 14)
        .attr('fill', 'transparent')
        .attr('cursor', 'pointer')
        .on('mouseenter', function() { tipG.attr('opacity', 1); })
        .on('mouseleave', function() { tipG.attr('opacity', 0); });
    }
  });

  // Auto-scroll to bottom
  wrap.scrollTop = wrap.scrollHeight;
}

// --- D3 Force Graph ---
let simulation, svg, linkGroup, nodeGroup;

function initGraph() {
  svg = d3.select('#graph');
  const width = svg.node().parentElement.clientWidth;
  const height = svg.node().parentElement.clientHeight - 35;

  svg.attr('viewBox', '0 0 ' + width + ' ' + height);

  linkGroup = svg.append('g').attr('class', 'links');
  nodeGroup = svg.append('g').attr('class', 'nodes');

  simulation = d3.forceSimulation()
    .force('link', d3.forceLink().id(function(d) { return d.id; }).distance(150))
    .force('charge', d3.forceManyBody().strength(-300))
    .force('center', d3.forceCenter(width / 2, height / 2))
    .force('collision', d3.forceCollide(50));
}

function updateGraph() {
  if (!simulation) return;

  const nodes = Array.from(sessions.keys()).map(function(name) {
    return { id: name, goal: sessions.get(name)?.goal || '' };
  });

  const links = [];
  edges.forEach(function(count, key) {
    const parts = key.split('->');
    const from = parts[0], to = parts[1];
    if (from && to && to !== 'broadcast' && sessions.has(from) && sessions.has(to)) {
      links.push({ source: from, target: to, count: count });
    }
  });

  const colors = ['#58a6ff', '#f0883e', '#3fb950', '#bc8cff', '#f778ba', '#79c0ff', '#d2a8ff'];

  const link = linkGroup.selectAll('line').data(links, function(d) {
    return (d.source.id || d.source) + '-' + (d.target.id || d.target);
  });
  link.exit().remove();
  const linkEnter = link.enter().append('line').attr('class', 'link active')
    .attr('stroke-width', function(d) { return Math.min(d.count + 1, 5); });
  const linkMerged = linkEnter.merge(link);

  const node = nodeGroup.selectAll('g.node').data(nodes, function(d) { return d.id; });
  node.exit().remove();
  const nodeEnter = node.enter().append('g').attr('class', 'node').call(drag(simulation));

  nodeEnter.append('circle')
    .attr('r', 24)
    .attr('fill', function(d, i) { return colors[i % colors.length]; });

  nodeEnter.append('text')
    .attr('dy', -32)
    .attr('text-anchor', 'middle')
    .text(function(d) { return d.id; });

  nodeEnter.append('text')
    .attr('class', 'goal')
    .attr('dy', 42)
    .attr('text-anchor', 'middle')
    .text(function(d) { return d.goal.length > 30 ? d.goal.slice(0, 30) + '...' : d.goal; });

  const nodeMerged = nodeEnter.merge(node);

  simulation.nodes(nodes).on('tick', function() {
    linkMerged
      .attr('x1', function(d) { return d.source.x; }).attr('y1', function(d) { return d.source.y; })
      .attr('x2', function(d) { return d.target.x; }).attr('y2', function(d) { return d.target.y; });
    nodeMerged.attr('transform', function(d) { return 'translate(' + d.x + ',' + d.y + ')'; });
  });

  simulation.force('link').links(links);
  simulation.alpha(0.3).restart();
}

function drag(sim) {
  return d3.drag()
    .on('start', function(e, d) { if (!e.active) sim.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; })
    .on('drag', function(e, d) { d.fx = e.x; d.fy = e.y; })
    .on('end', function(e, d) { if (!e.active) sim.alphaTarget(0); d.fx = null; d.fy = null; });
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// --- Init ---
initGraph();
connect();
</script>
</body>
</html>
