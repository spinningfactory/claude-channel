<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Claude Channel Dashboard</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0d1117; color: #c9d1d9; }

  .container { display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: auto 1fr; height: 100vh; gap: 1px; background: #21262d; }
  .header { grid-column: 1 / -1; padding: 12px 20px; background: #161b22; border-bottom: 1px solid #30363d; display: flex; align-items: center; gap: 16px; }
  .header h1 { font-size: 16px; font-weight: 600; color: #f0f6fc; }
  .header .status { font-size: 13px; color: #8b949e; }
  .header .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 4px; }
  .dot.connected { background: #3fb950; }
  .dot.disconnected { background: #f85149; }

  .panel { background: #0d1117; overflow: hidden; display: flex; flex-direction: column; }
  .panel-header { padding: 10px 16px; font-size: 13px; font-weight: 600; color: #8b949e; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid #21262d; background: #161b22; }

  /* Graph panel */
  #graph-panel svg { width: 100%; height: 100%; }
  .node circle { stroke: #30363d; stroke-width: 2; cursor: pointer; }
  .node text { fill: #c9d1d9; font-size: 11px; font-weight: 500; }
  .node .goal { fill: #8b949e; font-size: 10px; }
  .link { stroke: #30363d; stroke-width: 1.5; fill: none; }
  .link.active { stroke: #58a6ff; stroke-width: 2; }
  .message-particle { fill: #58a6ff; }

  /* Chat panel */
  #chat-panel { overflow: hidden; }
  #chat-messages { flex: 1; overflow-y: auto; padding: 8px; }
  .chat-msg { padding: 6px 12px; margin: 2px 0; border-radius: 6px; font-size: 13px; line-height: 1.4; }
  .chat-msg.message { background: #161b22; border-left: 3px solid #58a6ff; }
  .chat-msg.join { background: #0d2818; border-left: 3px solid #3fb950; color: #3fb950; font-size: 12px; }
  .chat-msg.leave { background: #2d1117; border-left: 3px solid #f85149; color: #f85149; font-size: 12px; }
  .chat-msg .meta { display: flex; gap: 8px; margin-bottom: 2px; }
  .chat-msg .from { font-weight: 600; color: #f0f6fc; }
  .chat-msg .channel { color: #8b949e; font-size: 11px; }
  .chat-msg .time { color: #484f58; font-size: 11px; margin-left: auto; }
  .chat-msg .body { color: #c9d1d9; }

  /* Sessions panel */
  #sessions-panel { }
  #sessions-list { flex: 1; overflow-y: auto; padding: 8px; }
  .session-card { padding: 10px 12px; margin: 4px 0; background: #161b22; border-radius: 6px; border: 1px solid #21262d; }
  .session-card .name { font-weight: 600; color: #58a6ff; font-size: 14px; }
  .session-card .goal { color: #8b949e; font-size: 12px; margin-top: 2px; }
  .session-card .started { color: #484f58; font-size: 11px; margin-top: 4px; }

  /* Sequence swim-lane diagram */
  #sequence-panel { }
  #sequence-view { flex: 1; overflow: auto; }
  #sequence-svg { display: block; }
  .lane-header { fill: #f0f6fc; font-size: 12px; font-weight: 600; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; text-anchor: middle; }
  .lane-line { stroke: #30363d; stroke-width: 1; stroke-dasharray: 4 3; }
  .arrow-questions { stroke: #58a6ff; stroke-width: 1.5; fill: none; }
  .arrow-dm { stroke: #f0883e; stroke-width: 1.5; fill: none; }
  .arrow-lobby { stroke: #3fb950; stroke-width: 1; stroke-dasharray: 5 3; fill: none; }
  .arrow-label { font-size: 10px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #8b949e; pointer-events: none; }
  .lobby-label { font-size: 10px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #3fb950; }
  .sub-conv-box { fill: rgba(240, 136, 62, 0.06); stroke: rgba(240, 136, 62, 0.2); stroke-width: 1; }

  @media (max-width: 900px) {
    .container { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>Claude Channel Dashboard</h1>
    <span class="status"><span class="dot" id="status-dot"></span><span id="status-text">Connecting...</span></span>
    <span class="status" id="session-count"></span>
  </div>

  <div class="panel" id="graph-panel">
    <div class="panel-header">Session Graph</div>
    <svg id="graph"></svg>
  </div>

  <div class="panel" id="chat-panel">
    <div class="panel-header">Message Feed</div>
    <div id="chat-messages"></div>
  </div>

  <div class="panel" id="sessions-panel">
    <div class="panel-header">Active Sessions</div>
    <div id="sessions-list"></div>
  </div>

  <div class="panel" id="sequence-panel">
    <div class="panel-header">Sequence</div>
    <div id="sequence-view">
      <svg id="sequence-svg">
        <defs>
          <marker id="arrowBlue" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#58a6ff"/>
          </marker>
          <marker id="arrowOrange" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#f0883e"/>
          </marker>
        </defs>
      </svg>
    </div>
  </div>
</div>

<script>
const sessions = new Map();
const messages = [];
const edges = new Map(); // "from->to" => count

// --- SSE Connection ---
let evtSource;
function connect() {
  evtSource = new EventSource('/events');
  evtSource.onopen = () => {
    document.getElementById('status-dot').className = 'dot connected';
    document.getElementById('status-text').textContent = 'Connected';
  };
  evtSource.onerror = () => {
    document.getElementById('status-dot').className = 'dot disconnected';
    document.getElementById('status-text').textContent = 'Reconnecting...';
  };
  evtSource.onmessage = (e) => {
    const event = JSON.parse(e.data);
    handleEvent(event);
  };
}

function handleEvent(event) {
  if (event.event_type === 'sessions') {
    // Full session list update
    const sessionData = JSON.parse(event.body);
    sessions.clear();
    sessionData.forEach(([name, data]) => {
      sessions.set(name, data);
    });
    renderSessions();
    updateGraph();
    return;
  }

  // Chat message
  messages.push(event);
  if (messages.length > 200) messages.shift();

  if (event.event_type === 'join') {
    sessions.set(event.from, { goal: event.body });
    renderSessions();
  } else if (event.event_type === 'leave') {
    sessions.delete(event.from);
    renderSessions();
  }

  // Track edges for graph
  if (event.from && event.from !== 'unknown' && event.from !== '_system') {
    let target = 'broadcast';
    if (event.channel.startsWith('claude:session:')) {
      target = event.channel.replace('claude:session:', '');
    }
    const key = `${event.from}->${target}`;
    edges.set(key, (edges.get(key) || 0) + 1);
  }

  renderChat();
  renderSequence();
  updateGraph();
}

// --- Sessions List ---
function renderSessions() {
  const el = document.getElementById('sessions-list');
  const count = document.getElementById('session-count');
  count.textContent = `${sessions.size} session${sessions.size !== 1 ? 's' : ''} online`;

  el.innerHTML = '';
  sessions.forEach((data, name) => {
    const card = document.createElement('div');
    card.className = 'session-card';
    const goal = typeof data === 'object' ? (data.goal || 'unknown') : data;
    const started = typeof data === 'object' && data.started
      ? new Date(data.started).toLocaleTimeString() : '';
    card.innerHTML = `
      <div class="name">${esc(name)}</div>
      <div class="goal">${esc(goal)}</div>
      ${started ? `<div class="started">since ${started}</div>` : ''}
    `;
    el.appendChild(card);
  });
}

// --- Chat Feed ---
function renderChat() {
  const el = document.getElementById('chat-messages');
  const last10 = messages.slice(-50);
  el.innerHTML = '';
  last10.forEach(msg => {
    const div = document.createElement('div');
    div.className = `chat-msg ${msg.event_type}`;
    const time = new Date(msg.timestamp).toLocaleTimeString();
    const ch = msg.channel.replace('claude:', '');

    if (msg.event_type === 'join') {
      div.innerHTML = `<span class="time">${time}</span> <b>${esc(msg.from)}</b> joined — ${esc(msg.body)}`;
    } else if (msg.event_type === 'leave') {
      div.innerHTML = `<span class="time">${time}</span> <b>${esc(msg.from)}</b> left`;
    } else {
      div.innerHTML = `
        <div class="meta">
          <span class="from">${esc(msg.from)}</span>
          <span class="channel">#${esc(ch)}</span>
          <span class="time">${time}</span>
        </div>
        <div class="body">${esc(msg.body)}</div>
      `;
    }
    el.appendChild(div);
  });
  el.scrollTop = el.scrollHeight;
}

// --- Sequence Diagram (SVG Swim Lane) ---
function renderSequence() {
  const wrapper = document.getElementById('sequence-view');
  const svg = d3.select('#sequence-svg');

  // Collect all known session names for lanes
  const seqSessions = [];
  const seqSessionSet = new Set();
  sessions.forEach((_, name) => {
    if (!seqSessionSet.has(name)) { seqSessions.push(name); seqSessionSet.add(name); }
  });
  messages.forEach(m => {
    if (m.from && m.from !== 'unknown' && m.from !== '_system' && !seqSessionSet.has(m.from)) {
      seqSessions.push(m.from); seqSessionSet.add(m.from);
    }
  });

  if (seqSessions.length === 0) {
    svg.attr('width', 0).attr('height', 0);
    return;
  }

  const laneWidth = 140;
  const laneMargin = 60;
  const headerY = 25;
  const startY = 50;
  const rowHeight = 40;

  const filteredMsgs = messages.filter(m =>
    m.event_type === 'message' || m.event_type === 'join' || m.event_type === 'leave'
  ).slice(-40);

  const totalWidth = Math.max(laneMargin + seqSessions.length * laneWidth, 300);
  const totalHeight = startY + filteredMsgs.length * rowHeight + 40;

  svg.attr('width', totalWidth).attr('height', totalHeight);

  // Clear previous content (keep defs)
  svg.selectAll('g.seq-content').remove();
  const g = svg.append('g').attr('class', 'seq-content');

  const laneX = (idx) => laneMargin + idx * laneWidth + laneWidth / 2;

  // Draw lane headers and lifelines
  seqSessions.forEach((name, i) => {
    const x = laneX(i);
    g.append('rect')
      .attr('x', x - 42).attr('y', 6).attr('width', 84).attr('height', 22)
      .attr('rx', 4).attr('fill', '#161b22').attr('stroke', '#30363d').attr('stroke-width', 1);
    g.append('text')
      .attr('class', 'lane-header')
      .attr('x', x).attr('y', headerY - 4)
      .text(name);
    g.append('line')
      .attr('class', 'lane-line')
      .attr('x1', x).attr('y1', startY - 8)
      .attr('x2', x).attr('y2', totalHeight - 10);
  });

  // Detect sub-conversations (consecutive DMs between same pair)
  const subConvGroups = [];
  let currentGroup = null;
  filteredMsgs.forEach((msg, i) => {
    if (msg.event_type === 'message' && msg.channel && msg.channel.startsWith('claude:session:')) {
      const target = msg.channel.replace('claude:session:', '');
      const pair = [msg.from, target].sort().join('<>');
      if (currentGroup && currentGroup.pair === pair) {
        currentGroup.end = i;
      } else {
        if (currentGroup && currentGroup.end > currentGroup.start) {
          subConvGroups.push(currentGroup);
        }
        currentGroup = { pair, start: i, end: i };
      }
    } else {
      if (currentGroup && currentGroup.end > currentGroup.start) {
        subConvGroups.push(currentGroup);
      }
      currentGroup = null;
    }
  });
  if (currentGroup && currentGroup.end > currentGroup.start) {
    subConvGroups.push(currentGroup);
  }

  // Draw sub-conversation shaded boxes
  subConvGroups.forEach(grp => {
    const names = grp.pair.split('<>');
    const idx0 = seqSessions.indexOf(names[0]);
    const idx1 = seqSessions.indexOf(names[1]);
    if (idx0 < 0 || idx1 < 0) return;
    const minIdx = Math.min(idx0, idx1);
    const maxIdx = Math.max(idx0, idx1);
    const x1 = laneX(minIdx) - 35;
    const x2 = laneX(maxIdx) + 35;
    const y1 = startY + grp.start * rowHeight - 8;
    const y2 = startY + grp.end * rowHeight + 22;
    g.append('rect')
      .attr('class', 'sub-conv-box')
      .attr('x', x1).attr('y', y1)
      .attr('width', x2 - x1).attr('height', y2 - y1)
      .attr('rx', 4).attr('ry', 4);
  });

  // Draw message arrows
  filteredMsgs.forEach((msg, i) => {
    const y = startY + i * rowHeight + 10;
    const fromIdx = seqSessions.indexOf(msg.from);

    if (msg.event_type === 'join' || msg.event_type === 'leave') {
      // Lobby: green dashed line spanning all lanes
      const xStart = laneX(0) - 25;
      const xEnd = laneX(seqSessions.length - 1) + 25;
      g.append('line')
        .attr('class', 'arrow-lobby')
        .attr('x1', xStart).attr('y1', y)
        .attr('x2', xEnd).attr('y2', y);
      const label = msg.event_type === 'join' ? `${msg.from} joined` : `${msg.from} left`;
      g.append('text')
        .attr('class', 'lobby-label')
        .attr('x', (xStart + xEnd) / 2).attr('y', y - 6)
        .attr('text-anchor', 'middle')
        .text(label);
    } else if (msg.event_type === 'message') {
      const ch = (msg.channel || '').replace('claude:', '');
      const bodyShort = (msg.body || '').length > 30 ? msg.body.slice(0, 30) + '...' : (msg.body || '');

      if (ch === 'questions') {
        // Broadcast: arrows from sender to every other lane
        if (fromIdx < 0) return;
        const fromX = laneX(fromIdx);
        seqSessions.forEach((name, j) => {
          if (j === fromIdx) return;
          const toX = laneX(j);
          const dir = toX > fromX ? 1 : -1;
          g.append('line')
            .attr('class', 'arrow-questions')
            .attr('x1', fromX + dir * 8).attr('y1', y)
            .attr('x2', toX - dir * 8).attr('y2', y)
            .attr('marker-end', 'url(#arrowBlue)');
        });
        // Label above arrows
        const labelX = fromIdx === 0
          ? fromX + (laneX(1) - fromX) / 2
          : fromX - (fromX - laneX(fromIdx - 1)) / 2;
        g.append('text')
          .attr('class', 'arrow-label')
          .attr('x', labelX).attr('y', y - 6)
          .attr('text-anchor', 'middle')
          .text(bodyShort);
      } else if (ch.startsWith('session:')) {
        // DM: single arrow from sender to target
        const target = ch.replace('session:', '');
        const toIdx = seqSessions.indexOf(target);
        if (fromIdx < 0 || toIdx < 0) return;
        const fromX = laneX(fromIdx);
        const toX = laneX(toIdx);
        const dir = toX > fromX ? 1 : -1;
        g.append('line')
          .attr('class', 'arrow-dm')
          .attr('x1', fromX + dir * 8).attr('y1', y)
          .attr('x2', toX - dir * 8).attr('y2', y)
          .attr('marker-end', 'url(#arrowOrange)');
        g.append('text')
          .attr('class', 'arrow-label')
          .attr('x', (fromX + toX) / 2).attr('y', y - 6)
          .attr('text-anchor', 'middle')
          .text(bodyShort);
      }
    }
  });

  // Auto-scroll to bottom
  wrapper.scrollTop = wrapper.scrollHeight;
}

// --- D3 Force Graph ---
let simulation, svg, linkGroup, nodeGroup;

function initGraph() {
  svg = d3.select('#graph');
  const width = svg.node().parentElement.clientWidth;
  const height = svg.node().parentElement.clientHeight - 35;

  svg.attr('viewBox', `0 0 ${width} ${height}`);

  linkGroup = svg.append('g').attr('class', 'links');
  nodeGroup = svg.append('g').attr('class', 'nodes');

  simulation = d3.forceSimulation()
    .force('link', d3.forceLink().id(d => d.id).distance(150))
    .force('charge', d3.forceManyBody().strength(-300))
    .force('center', d3.forceCenter(width / 2, height / 2))
    .force('collision', d3.forceCollide(50));
}

function updateGraph() {
  if (!simulation) return;

  const nodes = Array.from(sessions.keys()).map(name => ({
    id: name,
    goal: sessions.get(name)?.goal || '',
  }));

  const links = [];
  edges.forEach((count, key) => {
    const [from, to] = key.split('->');
    if (from && to && to !== 'broadcast' && sessions.has(from) && sessions.has(to)) {
      links.push({ source: from, target: to, count });
    }
  });

  // Colors for nodes
  const colors = ['#58a6ff', '#f0883e', '#3fb950', '#bc8cff', '#f778ba', '#79c0ff', '#d2a8ff'];

  // Links
  const link = linkGroup.selectAll('line').data(links, d => `${d.source.id || d.source}-${d.target.id || d.target}`);
  link.exit().remove();
  const linkEnter = link.enter().append('line').attr('class', 'link active').attr('stroke-width', d => Math.min(d.count + 1, 5));
  const linkMerged = linkEnter.merge(link);

  // Nodes
  const node = nodeGroup.selectAll('g.node').data(nodes, d => d.id);
  node.exit().remove();
  const nodeEnter = node.enter().append('g').attr('class', 'node').call(drag(simulation));

  nodeEnter.append('circle')
    .attr('r', 24)
    .attr('fill', (d, i) => colors[i % colors.length]);

  nodeEnter.append('text')
    .attr('dy', -32)
    .attr('text-anchor', 'middle')
    .text(d => d.id);

  nodeEnter.append('text')
    .attr('class', 'goal')
    .attr('dy', 42)
    .attr('text-anchor', 'middle')
    .text(d => d.goal.length > 30 ? d.goal.slice(0, 30) + '...' : d.goal);

  const nodeMerged = nodeEnter.merge(node);

  simulation.nodes(nodes).on('tick', () => {
    linkMerged
      .attr('x1', d => d.source.x).attr('y1', d => d.source.y)
      .attr('x2', d => d.target.x).attr('y2', d => d.target.y);
    nodeMerged.attr('transform', d => `translate(${d.x},${d.y})`);
  });

  simulation.force('link').links(links);
  simulation.alpha(0.3).restart();
}

function drag(sim) {
  return d3.drag()
    .on('start', (e, d) => { if (!e.active) sim.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; })
    .on('drag', (e, d) => { d.fx = e.x; d.fy = e.y; })
    .on('end', (e, d) => { if (!e.active) sim.alphaTarget(0); d.fx = null; d.fy = null; });
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// --- Init ---
initGraph();
connect();
</script>
</body>
</html>
